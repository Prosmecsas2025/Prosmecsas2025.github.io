<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias por tu mensaje</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .mensaje {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    .btn-volver, .btn-whatsapp {
      margin-top: 1.5rem;
      border: none;
      padding: 0.6rem 1.5rem;
      font-weight: bold;
      border-radius: 8px;
      transition: all 0.3s ease-in-out;
    }
    .btn-volver {
      background-color: white;
      color: #0d47a1;
      margin-right: 10px;
    }
    .btn-volver:hover {
      background-color: #bbdefb;
    }
    .btn-whatsapp {
      background-color: #25D366;
      color: white;
      display: inline-flex;
      align-items: center;
    }
    .btn-whatsapp i {
      margin-right: 8px;
      animation: pulse 1.5s infinite;
      transition: transform 0.3s ease;
    }
    .btn-whatsapp:hover {
      background-color: #1ebf57;
    }
    .btn-whatsapp:hover i {
      transform: rotate(20deg);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
    }
  </style>
</head>
<body>
  <div class="mensaje">
    <h1>¡Gracias por contactarnos!</h1>
    <p>Tu mensaje ha sido enviado correctamente.<br>En breve nos pondremos en contacto contigo.</p>
    <div>
      <a href="index.html" class="btn btn-volver">Volver al inicio</a>
      <a href="https://wa.link/3utirl" target="_blank" class="btn btn-whatsapp">
        <i class="bi bi-whatsapp"></i>Escríbenos por WhatsApp
      </a>
    </div>
  </div>
</body>
</html>
